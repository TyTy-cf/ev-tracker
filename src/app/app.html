<main class="min-h-screen bg-gray-100 p-8 font-sans">
  <div class="max-w-7xl mx-auto bg-white rounded-xl shadow-lg overflow-hidden">

    <div class="bg-blue-600 text-white p-6 flex items-center justify-between">
      <h1 class="text-3xl font-bold">Pokémon EV Tracker</h1>
      <p class="text-blue-100 mt-2">Gérez les EVs de votre équipe</p>
      <button (click)="trackerService.resetAll()"
              class="flex cursor-pointer items-center gap-2 bg-red-500 hover:bg-red-600 text-white font-semibold py-2 px-4 rounded-lg shadow transition-colors">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
        </svg>
        Réinitialiser tout
      </button>
    </div>

    <app-pokemon-table></app-pokemon-table>

  </div>
</main>
