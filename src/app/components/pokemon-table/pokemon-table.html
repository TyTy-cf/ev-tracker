<div class="overflow-x-auto p-4">
  <table class="w-full border-collapse text-sm border-t border-b">
    <thead>
    <tr class="bg-gray-200 text-gray-700 uppercase tracking-wider text-center text-xs">
      <th class="border-b border-r p-3 w-16">Active</th>
      <th class="border-b border-r p-3 w-48">Pokémon</th>
      <th class="border-b border-r p-3 w-24">Nature</th>
      @for (stat of statsList; track stat.key) {
        <th class="border-b border-r p-3">
          {{ stat.label }}
          <span class="block text-[10px] text-gray-500 font-normal mt-0.5 tracking-normal normal-case">(Done / Wanted)</span>
        </th>
      }

      <th class="border-b border-r p-3 bg-gray-300">
        TOTAL
        <span class="block text-[10px] text-gray-500 font-normal mt-0.5 tracking-normal normal-case">(Done / Wanted)</span>
      </th>
      <th class="border-b border-r p-3 w-40">Item</th>
      <th class="border-b border-l p-3 w-12"></th>
    </tr>
    </thead>

    <tbody>
      @for (pokemon of team(); track pokemon.id) {
        <tr app-pokemon-row
            [pokemon]="pokemon"
            (pokemonChange)="onPokemonUpdate($event)"
            (resetRequest)="onResetPokemon($event)"
            class="border-b hover:bg-gray-50 text-center text-sm">
        </tr>
      }
    </tbody>
  </table>
</div>

<div class="p-6 bg-gray-50 border-t flex flex-col gap-4 rounded-b-xl">
  <h3 class="font-semibold text-gray-700 text-center sm:text-left">Pokémons defeated (+ EV)</h3>
  <div class="grid grid-cols-6 gap-2 sm:gap-4">
    @for (stat of statsList; track stat.key) {
      <div class="flex flex-col gap-2">
        <p class="border py-2 font-bold rounded text-center text-xs sm:text-sm text-gray-600">{{ stat.label }}</p>
        <button (click)="gainEv(stat.key, 1)"
                class="w-full p-2 bg-blue-100 hover:bg-blue-200 text-blue-800 font-bold rounded shadow transition-colors cursor-pointer text-xs sm:text-sm flex justify-center items-center">
          +1
        </button>
        <button (click)="gainEv(stat.key, 2)"
                class="w-full p-2 bg-blue-500 hover:bg-blue-600 text-white font-bold rounded shadow transition-colors cursor-pointer text-xs sm:text-sm flex justify-center items-center">
          +2
        </button>
        <button (click)="gainEv(stat.key, 3)"
                class="w-full p-2 bg-blue-800 hover:bg-blue-900 text-white font-bold rounded shadow transition-colors cursor-pointer text-xs sm:text-sm flex justify-center items-center">
          +3
        </button>
      </div>
    }
  </div>
</div>
