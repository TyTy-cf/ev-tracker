<td class="p-2 border-r text-center">
  <input type="checkbox" [ngModel]="pokemon().isActive" (ngModelChange)="updateField('isActive', $event)" class="w-4 h-4 cursor-pointer">
</td>

<td class="p-2 border-r min-w-40">
  <div class="flex items-center gap-2">
    <div class="w-10 h-10 shrink-0 flex items-center justify-center">
      @if (pokemonSpriteUrl()) {
        <img [src]="pokemonSpriteUrl()" class="w-10 h-10 object-contain drop-shadow-sm" alt="sprite">
      }
    </div>
    <input type="text" [ngModel]="pokemon().name" (ngModelChange)="updateField('name', $event)" placeholder="Name" class="w-full grow text-center border rounded p-1 focus:ring-2 focus:ring-blue-400 outline-none uppercase font-semibold text-xs">
  </div>
</td>

<td class="p-2 border-r w-24">
  <select [ngModel]="pokemon().nature?.label"
          [title]="pokemon().nature?.positiveEffect ? '+' + pokemon().nature?.positiveEffect + ' / -' + pokemon().nature?.negativeEffect : ''"
          (ngModelChange)="updateNatureFromModel($event)"
          class="w-full text-center border rounded p-1 appearance-none bg-white cursor-pointer text-xs">
    <option [ngValue]="undefined">None</option>
    @for (nature of natures; track nature.label) {
      <option [value]="nature.label">{{ nature.label }}</option>
    }
  </select>
</td>

@for (stat of statsList; track stat) {
  <td class="p-2 border-r text-center transition-colors duration-300" [ngClass]="getCellColor(stat)">
    <div class="flex items-center justify-center gap-1 bg-white/60 rounded-md py-1 px-2 mx-auto w-fit shadow-sm border border-white/50 backdrop-blur-sm">
      <input type="number" min="0" max="252" step="2"
             [value]="pokemon().stats[stat].done"
             (change)="updateStat(stat, 'done', $event.target.value)"
             [ngClass]="pokemon().stats[stat].done >= 252 ? 'text-blue-700' : 'text-gray-900'"
             class="w-10 text-right border-b-2 border-transparent hover:border-gray-300 focus:border-blue-500 bg-transparent font-bold text-sm outline-none transition-colors appearance-none">
      <span class="text-gray-400 font-light select-none text-xs">/</span>
      <input type="number" min="0" max="252" step="2"
             [value]="pokemon().stats[stat].req"
             (change)="updateStat(stat, 'req', $event.target.value)"
             class="w-9 text-left border-b-2 border-transparent hover:border-gray-300 focus:border-blue-500 bg-transparent text-gray-500 text-xs font-medium outline-none transition-colors appearance-none">
    </div>
  </td>
}

<td class="p-1 border-r text-center transition-colors duration-300" [ngClass]="getTotalDoneColor()">
  <div class="flex items-center justify-center gap-1 font-semibold">
    <!-- Total Done -->
    <span class="w-12 text-center text-sm" [ngClass]="{'text-red-700': totalDone() > 510}">
      {{ totalDone() }}
    </span>

    <span class="text-gray-400 font-light select-none">/</span>

    <span class="w-10 text-center text-sm"
          [ngClass]="{'text-red-500': totalReq() > 510, 'text-green-700': totalReq() >= 508, 'text-gray-600': totalReq() < 508}">
      {{ totalReq() }}
    </span>
  </div>
</td>

<td class="p-2 border-r relative min-w-30">
  <div class="flex items-center gap-2">
    <div class="w-6 h-6 shrink-0 flex items-center justify-center">
      @if (itemSpriteUrl()) {
        <img [src]="itemSpriteUrl()" class="w-6 h-6 object-contain" alt="item">
      }
    </div>
    <select [ngModel]="pokemon().item?.label" (ngModelChange)="updateItemFromModel($event)" class="w-full grow text-center border rounded p-1 appearance-none bg-white cursor-pointer text-xs">
      <option [ngValue]="undefined">None</option>
      @for (item of powerItems; track item.label) {
        <option [value]="item.label">{{ item.label }}</option>
      }
    </select>
  </div>
</td>

<td class="p-2 text-center">
  <button (click)="onReset()" title="Réinitialiser ce Pokémon" class="text-gray-400 hover:text-red-500 transition-colors p-1 rounded hover:bg-red-50">
    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
      <path stroke-linecap="round" stroke-linejoin="round" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
    </svg>
  </button>
</td>
