<td class="p-2 border-r text-center">
  <input type="checkbox"
         [ngModel]="pokemon().isActive"
         (ngModelChange)="updateField('isActive', $event)"
         class="w-4 h-4 cursor-pointer">
</td>

<td class="p-2 border-r min-w-40">
  <div class="flex items-center gap-2">
    <div class="w-10 h-10 shrink-0 flex items-center justify-center">
      @if (pokemonSpriteUrl()) {
        <img [src]="pokemonSpriteUrl()" class="w-10 h-10 object-contain drop-shadow-sm" alt="sprite">
      }
    </div>
    <input type="text"
           [ngModel]="pokemon().name"
           (ngModelChange)="updateField('name', $event)"
           placeholder="Nom"
           class="w-full grow text-center border rounded p-1 focus:ring-2 focus:ring-blue-400 outline-none uppercase font-semibold text-xs">
  </div>
</td>

<td class="p-2 border-r w-24">
  <select [ngModel]="pokemon().nature?.label"
          [title]="pokemon().nature?.positiveEffect + '/' + pokemon().nature?.negativeEffect"
          (ngModelChange)="updateNatureFromModel($event)"
          class="w-full text-center border rounded p-1 appearance-none bg-white cursor-pointer text-xs">
    <option [ngValue]="undefined">Aucun</option>
    @for (nature of natures; track nature.label) {
      <option [value]="nature.label" [title]="nature.positiveEffect + '/' + nature.negativeEffect">{{ nature.label }}</option>
    }
  </select>
</td>

@for (stat of statsList; track stat) {
  <td class="p-1 border-r bg-gray-50 text-center"
      [ngClass]="getCellColor(stat)">
    <input type="number"
           min="0"
           max="252"
           [value]="pokemon().stats[stat].req"
           (change)="updateStat(stat, 'req', $event.target.value)"
           class="w-12 text-center border rounded p-1 bg-transparent text-xs">
  </td>

  <td class="p-1 border-r font-medium transition-colors duration-300 text-center"
      [ngClass]="getCellColor(stat)">
    <input type="number"
           min="0"
           max="252"
           [value]="pokemon().stats[stat].done"
           (change)="updateStat(stat, 'done', $event.target.value)"
           class="w-12 text-center border rounded p-1 bg-transparent text-xs">
  </td>
}

<td class="p-1 border-r text-center font-semibold">
  {{ totalReq() }}
</td>

<td class="p-1 border-r text-center font-bold transition-colors duration-300"
    [ngClass]="getTotalColor()">
  {{ totalDone() }}
</td>

<td class="p-2 border-r relative min-w-30">
  @if (itemSpriteUrl()) {
    <img [src]="itemSpriteUrl()" class="w-6 h-6 absolute left-2 top-1/2 -translate-y-1/2" alt="item">
  }
  <select [ngModel]="pokemon().item?.label"
          (ngModelChange)="updateItemFromModel($event)"
          class="w-full text-center border rounded p-1 pl-8 appearance-none bg-white cursor-pointer text-xs">
    <option [ngValue]="undefined">Aucun</option>
    @for (item of powerItems; track item.label) {
      <option [value]="item.label">{{ item.label }}</option>
    }
  </select>
</td>

<td class="p-2 text-center">
  <button (click)="onReset()"
          title="Réinitialiser ce Pokémon"
          class="text-gray-400 hover:text-red-500 transition-colors p-1 rounded hover:bg-red-50">
    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
      <path stroke-linecap="round" stroke-linejoin="round" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
    </svg>
  </button>
</td>
